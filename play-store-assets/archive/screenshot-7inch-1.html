<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 1920px; overflow: hidden; background: #f5f5f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* Status bar */
  .status-bar { height: 60px; background: #f5f5f0; display: flex; align-items: center;
    justify-content: space-between; padding: 0 40px; font-size: 26px; font-weight: 600; color: #1c211f; }

  /* Tab header */
  .header { height: 100px; background: #f5f5f0; border-bottom: 1px solid rgba(28,33,31,0.10);
    display: flex; align-items: center; padding: 0 40px; }
  .header-title { font-size: 34px; font-weight: 600; color: #1c211f; }

  /* Screen content */
  .screen { flex: 1; background: #f5f5f0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; height: calc(1920px - 60px - 100px - 110px); gap: 24px; }

  .logo { width: 220px; height: 220px; object-fit: contain; margin-bottom: 16px; }
  .app-title { font-size: 60px; font-weight: 800; color: #1c211f; }
  .scan-btn { display: flex; align-items: center; gap: 16px; background: #bccf21;
    border-radius: 100px; padding: 28px 64px; margin-top: 40px; }
  .scan-btn-text { font-size: 34px; font-weight: 700; color: #1c211f; }
  .scan-icon { font-size: 34px; }

  /* Tab bar */
  .tab-bar { height: 110px; background: #f5f5f0; border-top: 1px solid rgba(28,33,31,0.10);
    display: flex; align-items: center; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .tab-icon { font-size: 36px; }
  .tab-label { font-size: 22px; font-weight: 500; }
  .tab.active .tab-icon, .tab.active .tab-label { color: #004e2a; }
  .tab.inactive .tab-icon, .tab.inactive .tab-label { color: #6b7470; }
</style>
</head>
<body>
  <div class="status-bar"><span>9:41</span><span>● ● ▌</span></div>
  <div class="header"><span class="header-title">Home</span></div>
  <div class="screen">
    <img class="logo" src="../assets/images/kiwi-icon.png" alt="Kiwi">
    <div class="app-title">Schreinerei Kiwi</div>
    <div class="scan-btn">
      <span class="scan-icon">📷</span>
      <span class="scan-btn-text">Beleg scannen</span>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active"><div class="tab-icon">🏠</div><div class="tab-label">Home</div></div>
    <div class="tab inactive"><div class="tab-icon">📋</div><div class="tab-label">Belege</div></div>
  </div>
</body>
</html>
