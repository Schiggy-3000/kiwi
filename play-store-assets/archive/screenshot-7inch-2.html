<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 1920px; overflow: hidden; background: #f5f5f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .status-bar { height: 60px; background: #f5f5f0; display: flex; align-items: center;
    justify-content: space-between; padding: 0 40px; font-size: 26px; font-weight: 600; color: #1c211f; }
  .header { height: 100px; background: #f5f5f0; border-bottom: 1px solid rgba(28,33,31,0.10);
    display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
  .header-title { font-size: 34px; font-weight: 600; color: #1c211f; }
  .export-btn { display: flex; align-items: center; gap: 10px; color: #004e2a; font-size: 28px; font-weight: 500; }
  .list { padding: 32px; display: flex; flex-direction: column; gap: 20px;
    height: calc(1920px - 60px - 100px - 110px); overflow: hidden; }
  .card { background: #fff; border-radius: 24px; border: 1px solid rgba(28,33,31,0.12);
    border-left: 6px solid #004e2a; padding: 36px 40px; display: flex; align-items: center; justify-content: space-between; }
  .card-left { display: flex; flex-direction: column; gap: 8px; }
  .card-date { font-size: 24px; color: #6b7470; }
  .card-business { font-size: 34px; font-weight: 600; color: #1c211f; }
  .card-right { display: flex; align-items: center; gap: 12px; }
  .card-amount { font-size: 34px; font-weight: 700; color: #004e2a; }
  .chevron { font-size: 28px; color: #6b7470; }
  .tab-bar { height: 110px; background: #f5f5f0; border-top: 1px solid rgba(28,33,31,0.10);
    display: flex; align-items: center; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .tab-icon { font-size: 36px; }
  .tab-label { font-size: 22px; font-weight: 500; }
  .tab.active .tab-icon, .tab.active .tab-label { color: #004e2a; }
  .tab.inactive .tab-icon, .tab.inactive .tab-label { color: #6b7470; }
</style>
</head>
<body>
  <div class="status-bar"><span>9:41</span><span>● ● ▌</span></div>
  <div class="header">
    <span class="header-title">Belege</span>
    <div class="export-btn">↑ Exportieren</div>
  </div>
  <div class="list">
    <div class="card">
      <div class="card-left">
        <div class="card-date">14.03.2026</div>
        <div class="card-business">Hornbach Luzern</div>
      </div>
      <div class="card-right"><div class="card-amount">CHF 184.50</div><div class="chevron">›</div></div>
    </div>
    <div class="card">
      <div class="card-left">
        <div class="card-date">12.03.2026</div>
        <div class="card-business">Migros Baumarkt</div>
      </div>
      <div class="card-right"><div class="card-amount">CHF 67.20</div><div class="chevron">›</div></div>
    </div>
    <div class="card">
      <div class="card-left">
        <div class="card-date">08.03.2026</div>
        <div class="card-business">Würth AG</div>
      </div>
      <div class="card-right"><div class="card-amount">CHF 312.80</div><div class="chevron">›</div></div>
    </div>
    <div class="card">
      <div class="card-left">
        <div class="card-date">05.03.2026</div>
        <div class="card-business">Holz Leuenberger</div>
      </div>
      <div class="card-right"><div class="card-amount">CHF 1'240.00</div><div class="chevron">›</div></div>
    </div>
    <div class="card">
      <div class="card-left">
        <div class="card-date">01.03.2026</div>
        <div class="card-business">Bürgi Schrauben</div>
      </div>
      <div class="card-right"><div class="card-amount">CHF 88.35</div><div class="chevron">›</div></div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab inactive"><div class="tab-icon">🏠</div><div class="tab-label">Home</div></div>
    <div class="tab active"><div class="tab-icon">📋</div><div class="tab-label">Belege</div></div>
  </div>
</body>
</html>
