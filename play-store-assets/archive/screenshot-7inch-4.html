<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 1920px; overflow: hidden; background: #f5f5f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .status-bar { height: 60px; background: #f5f5f0; display: flex; align-items: center;
    justify-content: space-between; padding: 0 40px; font-size: 26px; font-weight: 600; color: #1c211f; }
  .header { height: 100px; background: #f5f5f0; border-bottom: 1px solid rgba(28,33,31,0.10);
    display: flex; align-items: center; padding: 0 40px; gap: 24px; }
  .back { font-size: 30px; color: #004e2a; font-weight: 500; }
  .header-title { font-size: 34px; font-weight: 600; color: #1c211f; }
  .content { padding: 32px; display: flex; flex-direction: column; gap: 28px;
    height: calc(1920px - 60px - 100px); overflow: hidden; }
  .photo { width: 100%; height: 280px; background: #e0e0d8; border-radius: 24px;
    display: flex; align-items: center; justify-content: center; font-size: 70px; }
  .section-title { font-size: 34px; font-weight: 700; color: #1c211f; }
  .fields { display: flex; flex-direction: column; gap: 24px; }
  .field { display: flex; flex-direction: column; gap: 10px; }
  .field-label { font-size: 22px; font-weight: 600; color: #6b7470; text-transform: uppercase; letter-spacing: 1px; }
  .field-input { background: #fff; border: 1px solid rgba(28,33,31,0.15); border-radius: 16px;
    padding: 28px 32px; font-size: 30px; color: #1c211f; }
  .btn-save { display: flex; align-items: center; justify-content: center;
    background: #004e2a; border-radius: 24px; padding: 36px; margin-top: 8px; }
  .btn-save-text { font-size: 32px; font-weight: 600; color: #fff; }
</style>
</head>
<body>
  <div class="status-bar"><span>9:41</span><span>● ● ▌</span></div>
  <div class="header"><span class="back">‹ Zurück</span><span class="header-title">Beleg prüfen</span></div>
  <div class="content">
    <div class="photo">📷</div>
    <div class="section-title">Belegdaten prüfen</div>
    <div class="fields">
      <div class="field">
        <div class="field-label">Datum</div>
        <div class="field-input">14.03.2026</div>
      </div>
      <div class="field">
        <div class="field-label">Geschäft / Lieferant</div>
        <div class="field-input">Hornbach Luzern</div>
      </div>
      <div class="field">
        <div class="field-label">Betrag (CHF)</div>
        <div class="field-input">184.50</div>
      </div>
      <div class="field">
        <div class="field-label">MwSt (%)</div>
        <div class="field-input">8.1</div>
      </div>
      <div class="field">
        <div class="field-label">Zahlungsart</div>
        <div class="field-input">Karte ▾</div>
      </div>
    </div>
    <div class="btn-save"><span class="btn-save-text">Speichern</span></div>
  </div>
</body>
</html>
