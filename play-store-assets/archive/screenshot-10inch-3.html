<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1600px; height: 2560px; overflow: hidden; background: #f5f5f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .status-bar { height: 60px; background: #f5f5f0; display: flex; align-items: center;
    justify-content: space-between; padding: 0 40px; font-size: 26px; font-weight: 600; color: #1c211f; }
  .header { height: 100px; background: #f5f5f0; border-bottom: 1px solid rgba(28,33,31,0.10);
    display: flex; align-items: center; padding: 0 40px; gap: 24px; }
  .back { font-size: 30px; color: #004e2a; font-weight: 500; }
  .header-title { font-size: 34px; font-weight: 600; color: #1c211f; }
  .content { padding: 32px; display: flex; flex-direction: column; gap: 28px;
    height: calc(2560px - 60px - 100px); overflow: hidden; }
  .photo { width: 100%; height: 340px; background: #e0e0d8; border-radius: 24px;
    display: flex; align-items: center; justify-content: center; font-size: 80px; }
  .card { background: #fff; border-radius: 24px; border: 1px solid rgba(28,33,31,0.12); overflow: hidden; }
  .row { display: flex; align-items: center; padding: 32px 40px; gap: 28px; border-bottom: 1px solid rgba(28,33,31,0.08); }
  .row:last-child { border-bottom: none; }
  .row-icon { font-size: 34px; width: 48px; color: #004e2a; }
  .row-content { flex: 1; }
  .row-label { font-size: 22px; color: #6b7470; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .row-value { font-size: 32px; color: #1c211f; font-weight: 500; }
  .btn-edit { display: flex; align-items: center; justify-content: center; gap: 16px;
    background: #004e2a; border-radius: 24px; padding: 36px; }
  .btn-edit-text { font-size: 32px; font-weight: 600; color: #fff; }
</style>
</head>
<body>
  <div class="status-bar"><span>9:41</span><span>● ● ▌</span></div>
  <div class="header"><span class="back">‹ Zurück</span><span class="header-title">Beleg</span></div>
  <div class="content">
    <div class="photo">🧾</div>
    <div class="card">
      <div class="row"><div class="row-icon">📅</div><div class="row-content"><div class="row-label">Datum</div><div class="row-value">14.03.2026</div></div></div>
      <div class="row"><div class="row-icon">🏪</div><div class="row-content"><div class="row-label">Geschäft</div><div class="row-value">Hornbach Luzern</div></div></div>
      <div class="row"><div class="row-icon">💰</div><div class="row-content"><div class="row-label">Betrag</div><div class="row-value">CHF 184.50</div></div></div>
      <div class="row"><div class="row-icon">🏷</div><div class="row-content"><div class="row-label">MwSt</div><div class="row-value">8.1 %</div></div></div>
      <div class="row"><div class="row-icon">💳</div><div class="row-content"><div class="row-label">Zahlungsart</div><div class="row-value">Karte</div></div></div>
    </div>
    <div class="btn-edit"><span>✏️</span><span class="btn-edit-text">Beleg bearbeiten</span></div>
  </div>
</body>
</html>
